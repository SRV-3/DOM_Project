<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <section class="allElems">
        <div class="todo elem" id="0">
          <img
            src="https://plus.unsplash.com/premium_photo-1666739087569-eec71efac750?q=80&w=1038&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>To Do list</h2>
        </div>
        <div class="daily elem" id="1">
          <img
            src="https://images.unsplash.com/photo-1688475747590-d0db5e2412cb?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Daily Planner</h2>
        </div>
        <div class="motivation elem" id="2">
          <img
            src="https://plus.unsplash.com/premium_photo-1666788167961-1911d92180bb?q=80&w=711&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Motivation</h2>
        </div>
        <div class="pomodoro elem" id="3">
          <img
            src="https://images.unsplash.com/photo-1655012325191-cbc22182fa9f?q=80&w=1112&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Pomodor Timmer</h2>
        </div>
        <div class="goals elem" id="4">
          <img
            src="https://images.unsplash.com/photo-1720293063351-0b5b505a7f2a?q=80&w=1632&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Daily Goals</h2>
        </div>
      </section>
      <section class="fullElem todo-list-fullpage">
        <button class="back" id="0"><i class="ri-close-fill"></i></button>
        <h2>Your Personalised Task List</h2>
        <div class="todo-container">
          <div class="addTask">
            <form>
              <input id="task" type="text" placeholder="Your task" />
              <textarea name="" placeholder="Enter Details" id=""></textarea>
              <div>
                <div class="mark-imp">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="check"
                  />
                  <label class="form-check-label" for="check">
                    Mark as important
                  </label>
                </div>
              </div>
              <button>ADD</button>
            </form>
          </div>
          <div class="allTask"></div>
        </div>
      </section>
      <section class="fullElem dailyPlannerFullpage">
        <button class="back" id="1"><i class="ri-close-fill"></i></button>
        <h1>Daily Planner</h1>
      </section>
      <section class="fullElem motivationFullpage">
        <button class="back" id="2"><i class="ri-close-fill"></i></button>
        <h1>Motivational Quote</h1>
      </section>
      <section class="fullElem pomodoroFullpage">
        <button class="back" id="3"><i class="ri-close-fill"></i></button>
        <h1>Pomodoro Timer</h1>
      </section>
      <section class="fullElem goalsFullpage">
        <button class="back" id="4"><i class="ri-close-fill"></i></button>
        <h1>Daily Goals</h1>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
